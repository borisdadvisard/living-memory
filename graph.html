<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Living Memory</title>
  <link rel="stylesheet" href="lib/vis-9.1.2/vis-network.css">
  <script src="lib/vis-9.1.2/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #09090f; overflow: hidden; }

    /* Faint grid — visible through the transparent Vis.js canvas */
    #graph {
      width: 100vw;
      height: 100vh;
      background-color: #09090f;
      background-image:
        linear-gradient(rgba(100, 130, 210, 0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 130, 210, 0.032) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    #reset-hint {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(127, 255, 212, 0);
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      transition: color 0.7s ease;
      pointer-events: none;
      z-index: 10;
    }
    #reset-hint.visible { color: rgba(127, 255, 212, 0.42); }

    #meta {
      position: fixed;
      top: 18px;
      right: 22px;
      color: rgba(127, 255, 212, 0.16);
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.24em;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div id="reset-hint">click anywhere to reset</div>
  <div id="meta"></div>

  <script>
    const GRAPH_DATA = {"nodes": [{"id": "47263853-bcbc-43f7-8fb8-f7610d3b3ae6", "label": "Boris", "type_tag": "entity:person", "degree": 3}, {"id": "1d3defba-baaa-495b-935b-4085f6a0ca3b", "label": "London", "type_tag": "entity:place", "degree": 2}, {"id": "69ecdbed-b5b4-4cff-8af0-80eeb886081c", "label": "France", "type_tag": "entity:place", "degree": 0}, {"id": "9c62b747-88a0-4464-9f09-bb24980d9074", "label": "Spotify", "type_tag": "entity:org", "degree": 1}, {"id": "818a6c39-a2b0-4fb7-812f-3314ae3fce1c", "label": "Gerome", "type_tag": "entity:person", "degree": 0}, {"id": "514dc55b-1c3d-43fe-ba32-2b55d982247e", "label": "Snowflake", "type_tag": "entity:org", "degree": 0}, {"id": "475fe8c1-e04d-4272-bec4-4a451842f463", "label": "Atlan", "type_tag": "entity:org", "degree": 0}, {"id": "6acacdd1-a1e5-4b2c-9609-e7db014c4a59", "label": "ServiceNow", "type_tag": "entity:org", "degree": 0}, {"id": "07ed2249-3314-4e3d-966b-d2b1d78f1aaf", "label": "Alterix", "type_tag": "entity:org", "degree": 0}, {"id": "7d767759-1c5a-4233-9703-10ada390778b", "label": "Lyon", "type_tag": "entity:place", "degree": 1}, {"id": "498a520a-2d4b-400f-8021-588e99a335f0", "label": "Garront", "type_tag": "entity:place", "degree": 1}, {"id": "f01b074f-2395-4dea-8c68-1d1faebd56af", "label": "Bim", "type_tag": "entity:person", "degree": 2}, {"id": "63853e71-df63-4142-a2bb-86e19b8fefa4", "label": "Delivery in London", "type_tag": "event:state_change", "degree": 0}], "edges": [{"id": "e0", "from": "9c62b747-88a0-4464-9f09-bb24980d9074", "to": "47263853-bcbc-43f7-8fb8-f7610d3b3ae6", "type": "used_by"}, {"id": "e1", "from": "47263853-bcbc-43f7-8fb8-f7610d3b3ae6", "to": "1d3defba-baaa-495b-935b-4085f6a0ca3b", "type": "lives_in"}, {"id": "e2", "from": "498a520a-2d4b-400f-8021-588e99a335f0", "to": "7d767759-1c5a-4233-9703-10ada390778b", "type": "located_in"}, {"id": "e3", "from": "47263853-bcbc-43f7-8fb8-f7610d3b3ae6", "to": "f01b074f-2395-4dea-8c68-1d1faebd56af", "type": "related_to"}, {"id": "e4", "from": "f01b074f-2395-4dea-8c68-1d1faebd56af", "to": "1d3defba-baaa-495b-935b-4085f6a0ca3b", "type": "lives_in"}]};

    // ── Colour palette ──────────────────────────────────────────────────────
    const TYPE_COLORS = {
      'entity:person':         '#7fffd4',
      'entity:place':          '#6a8fd8',
      'entity:org':            '#9b8ed6',
      'entity:object':         '#5ab4d6',
      'entity:concept':        '#a3d9b1',
      'entity:digital_object': '#7ecfeb',
      'event:delivery':        '#e07c7c',
      'event:meeting':         '#e07c7c',
      'event:conversation':    '#e07c7c',
      'event:transaction':     '#e07c7c',
      'event:state_change':    '#e07c7c',
      'commitment:planned':    '#d4a85a',
      'commitment:confirmed':  '#d4a85a',
      'commitment:completed':  '#7fcc7f',
      'commitment:cancelled':  '#55566a',
    };
    const DEFAULT_COLOR = '#8888aa';
    const nodeColor = t => TYPE_COLORS[t] || DEFAULT_COLOR;

    // ── Build Vis.js DataSets ───────────────────────────────────────────────
    const MIN_SIZE = 9, MAX_SIZE = 32;
    const maxDegree = Math.max(...GRAPH_DATA.nodes.map(n => n.degree), 1);

    const visNodes = new vis.DataSet(GRAPH_DATA.nodes.map(n => {
      const c    = nodeColor(n.type_tag);
      const size = MIN_SIZE + (n.degree / maxDegree) * (MAX_SIZE - MIN_SIZE);
      return {
        id: n.id,
        _label: n.label,
        _color: c,
        label: '',
        color: {
          background: c, border: c,
          highlight: { background: '#ffffff', border: c },
          hover:      { background: c, border: '#ffffff' },
        },
        size,
        shape: 'dot',
        borderWidth: 0,
        borderWidthSelected: 2,
        font: { size: 0, color: c, face: 'DM Mono, Courier New, monospace', strokeWidth: 0 },
        shadow: { enabled: true, color: c + '55', size: 14, x: 0, y: 0 },
      };
    }));

    const visEdges = new vis.DataSet(GRAPH_DATA.edges.map(e => ({
      id:   e.id,
      from: e.from,
      to:   e.to,
      _type: e.type,
      color: {
        color:     'rgba(110, 120, 175, 0.18)',
        highlight: 'rgba(200, 215, 255, 0.55)',
        hover:     'rgba(200, 215, 255, 0.40)',
      },
      width: 1,
      selectionWidth: 0,
      smooth: { type: 'dynamic' },
      arrows: { to: { enabled: true, scaleFactor: 0.35 } },
    })));

    // ── Particle system ─────────────────────────────────────────────────────
    const particles = [];
    GRAPH_DATA.edges.forEach(e => {
      const src = GRAPH_DATA.nodes.find(n => n.id === e.from);
      const c   = src ? nodeColor(src.type_tag) : DEFAULT_COLOR;
      // First particle — random start phase
      particles.push({ fromId: e.from, toId: e.to, phase: Math.random(), color: c, edgeId: e.id });
      // Second particle for smaller graphs or randomly for larger ones
      if (GRAPH_DATA.edges.length < 60 || Math.random() > 0.45) {
        particles.push({ fromId: e.from, toId: e.to, phase: Math.random(), color: c, edgeId: e.id });
      }
    });

    // ── Network ─────────────────────────────────────────────────────────────
    const container = document.getElementById('graph');
    const network   = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
      physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: {
          gravitationalConstant: -80,
          springLength: 150,
          springConstant: 0.04,
          damping: 0.6,
        },
        stabilization: { iterations: 300, updateInterval: 10 },
        maxVelocity: 50,
        minVelocity: 0.1,
      },
      interaction: {
        hover: true,
        tooltipDelay: 9999999,  // effectively disable built-in tooltips
        hideEdgesOnDrag: false,
        zoomView: true,
        dragNodes: true,
      },
      nodes: { borderWidth: 0, borderWidthSelected: 2 },
      edges: { smooth: { type: 'dynamic' }, selectionWidth: 0 },
    });

    document.getElementById('meta').textContent =
      GRAPH_DATA.nodes.length + ' nodes  ·  ' + GRAPH_DATA.edges.length + ' edges';

    // ── Stabilisation → disable physics, start breathing visually ──────────
    let stabilised = false;
    network.on('stabilizationIterationsDone', () => {
      stabilised = true;
      network.setOptions({ physics: { enabled: false } });
    });

    // ── Hover: show / hide label ────────────────────────────────────────────
    let focusedNode = null;

    network.on('hoverNode', ({ node }) => {
      if (focusedNode !== null) return;
      const n = visNodes.get(node);
      visNodes.update({ id: node, label: n._label,
        font: { size: 13, color: n._color, face: 'DM Mono, Courier New, monospace', strokeWidth: 0 } });
    });

    network.on('blurNode', ({ node }) => {
      if (focusedNode !== null) return;
      visNodes.update({ id: node, label: '', font: { size: 0 } });
    });

    // ── Click: focus / reset ────────────────────────────────────────────────
    network.on('click', params => {
      if (params.nodes.length > 0) {
        const id = params.nodes[0];
        focusedNode === id ? resetFocus() : applyFocus(id);
      } else if (params.edges.length === 0) {
        resetFocus();
      }
    });

    function applyFocus(nodeId) {
      focusedNode = nodeId;
      const neighbours     = new Set(network.getConnectedNodes(nodeId));
      neighbours.add(nodeId);
      const connectedEdges = new Set(network.getConnectedEdges(nodeId));

      visNodes.update(visNodes.getIds().map(id => {
        const n = visNodes.get(id);
        const show = neighbours.has(id);
        return {
          id,
          hidden: !show,
          label:  show ? n._label : '',
          font: { size: show ? 13 : 0, color: n._color,
                  face: 'DM Mono, Courier New, monospace', strokeWidth: 0 },
        };
      }));
      visEdges.update(visEdges.getIds().map(id => ({
        id, hidden: !connectedEdges.has(id),
      })));

      document.getElementById('reset-hint').classList.add('visible');
    }

    function resetFocus() {
      if (focusedNode === null) return;
      focusedNode = null;
      visNodes.update(visNodes.getIds().map(id => ({
        id, hidden: false, label: '', font: { size: 0 },
      })));
      visEdges.update(visEdges.getIds().map(id => ({ id, hidden: false })));
      document.getElementById('reset-hint').classList.remove('visible');
    }

    // ── Animation loop ──────────────────────────────────────────────────────
    // One particle traverses an edge in ~5.5 s at 60 fps
    const PARTICLE_SPEED = 0.00018;
    let lastTime = null;

    function tick(now) {
      requestAnimationFrame(tick);
      if (!lastTime) { lastTime = now; return; }
      const dt = Math.min(now - lastTime, 50);
      lastTime = now;
      particles.forEach(p => { p.phase = (p.phase + PARTICLE_SPEED * dt) % 1.0; });
      if (stabilised) network.redraw();
    }
    requestAnimationFrame(tick);

    // ── Canvas: breathing halo + particles ──────────────────────────────────
    network.on('afterDrawing', ctx => {
      const now     = performance.now();
      const breathe = 0.45 + 0.35 * Math.sin(now * 0.00075);  // ~8 s period

      // Soft pulsing halo around every visible node
      visNodes.forEach(n => {
        if (n.hidden) return;
        const pos = network.getPosition(n.id);
        if (!pos) return;
        ctx.save();
        ctx.globalAlpha = breathe * 0.10;
        ctx.fillStyle   = n._color;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, n.size * 1.75, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // Particles along each edge
      particles.forEach(p => {
        const edge = visEdges.get(p.edgeId);
        if (edge && edge.hidden) return;
        const fromPos = network.getPosition(p.fromId);
        const toPos   = network.getPosition(p.toId);
        if (!fromPos || !toPos) return;

        const t     = p.phase;
        const x     = fromPos.x + (toPos.x - fromPos.x) * t;
        const y     = fromPos.y + (toPos.y - fromPos.y) * t;
        const alpha = Math.sin(t * Math.PI) * 0.82;

        ctx.save();
        ctx.globalAlpha  = alpha;
        ctx.shadowBlur   = 7;
        ctx.shadowColor  = p.color;
        ctx.fillStyle    = p.color;
        ctx.beginPath();
        ctx.arc(x, y, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    });
  </script>
</body>
</html>
